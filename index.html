<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo · Confirmación de Factura</title>
    <style>
        /* --- CSS BASE --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 16px;
        }

        .upload-card,
        .search-card,
        .result,
        #confirmForm {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .upload-button,
        button {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            border: none;
        }

        .upload-button:hover,
        button:hover {
            background: #1e40af;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .file-name {
            margin: 12px 0;
            font-size: 14px;
            color: #6b7280;
        }

        #confirmForm {
            display: grid;
            gap: 12px;
        }

        #confirmForm .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        #confirmForm label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            color: #374151;
        }

        #confirmForm input {
            padding: 6px 8px;
            font-size: 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 100%;
        }

        #lineItemsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            table-layout: fixed;
        }

        #lineItemsTable th,
        #lineItemsTable td {
            padding: 8px 6px;
            border: 1px solid #e6e6e6;
            text-align: left;
            font-size: 13px;
        }

        #lineItemsTable input {
            width: 100%;
            padding: 4px 6px;
            font-size: 13px;
            border-radius: 4px;
        }

        @media (max-width: 1024px) {
            .container {
                padding: 10px;
            }

            #lineItemsTable {
                display: block;
                overflow-x: auto;
            }
        }

        #loader {
            display: none;
            text-align: center;
            margin: 24px 0;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* results layout */
        #resultsContainer {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-top: 20px;
        }

        #documentSide {
            flex: 1;
            min-width: 420px;
            position: relative;
        }

        #documentWrapper {
            position: relative;
            display: inline-block;
        }

        #documentSide img {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            display: block;
        }

        #overlayContainer {
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #formSide {
            width: 420px;
        }

        #ocrImage {
            display: block;
            width: auto;
            /* o width: 100%; si quieres escalar al contenedor */
            max-width: none;
        }

        .ocr-box {
            position: absolute;
            border: 2px solid rgba(0, 123, 255, 0.9);
            background: rgba(0, 123, 255, 0.12);
            color: #003366;
            font-size: 12px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 2px;
            cursor: pointer;
            pointer-events: auto;
            box-sizing: border-box;
        }

        .ocr-chip {
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: grab;
            margin: 4px;
            display: inline-block;
        }

        .ocr-chip-container {
            max-width: 100%;
            overflow-x: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .hidden {
            display: none;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="containerCampToOcr">
            <div class="upload-card">
                <input type="file" id="fileInput" accept=".pdf,image/*" multiple hidden>
                <p>Máximo 15 páginas, 20 MB como máximo</p>
                <label for="fileInput" class="upload-button">📄 Subir factura</label>
                <p id="fileName" class="file-name">Ningún archivo seleccionado</p>
                <button id="processBtn" disabled>Procesar factura</button>
            </div>
            <div class="search-card">
                <p>Contenido a buscar</p>
                <input id="contSearchClave" type="text" placeholder="Clave"> :
                <input id="contSearchValor" type="text" placeholder="Valor">
                <button id="contBtn">Añadir</button>
                <button id="contFijoBtn">Contenidos fijos</button>
            </div>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p>Procesando factura, por favor espere...</p>
        </div>

        <div style="margin-top:14px; display:flex; gap:8px;flex-direction: row-reverse;">
            <button id="nextResultBtn">Siguiente</button>
            <button id="prevResultBtn">Anterior</button>
        </div>

        <div id="resultsContainer" class="hidden">
            <div id="documentSide">
                <div id="documentWrapper" style="position:relative">
                    <img id="ocrImage" alt="Documento procesado" style="display:none;">
                    <canvas id="ocrCanvas" style="display:none;"></canvas>
                    <div id="overlayContainer"></div>
                </div>
            </div>

            <div id="formSide">
                <div id="resultInfo" style="margin-bottom:10px; font-weight:bold;"></div>

                <form id="confirmForm" class="hidden">
                    <button type="button" id="downloadExcelBtn">Descargar CSV</button>
                </form>
            </div>
        </div>

        <div class="footer-note">Arrastra o haz click sobre un overlay/chip para rellenar un campo.</div>
    </div>

    <!-- Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        /* ----------------------------
           CONFIG
           ---------------------------- */
        const N8N_WEBHOOK_URL = "https://n8n.neo-n8n.com/webhook/google-doc-ai";
        const N8N_LOCAL = "http://localhost:5678/webhook-test/google-doc-ai";

        /* ----------------------------
           DOM refs + estado
           ---------------------------- */
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const loader = document.getElementById('loader');
        const confirmForm = document.getElementById('confirmForm');

        const ocrImage = document.getElementById('ocrImage');
        const ocrCanvas = document.getElementById('ocrCanvas');

        const overlayContainer = document.getElementById('overlayContainer');
        const resultInfo = document.getElementById('resultInfo');
        //const lineItemsTbody = document.querySelector('#lineItemsTabletbody');
        const resultsContainer = document.getElementById('resultsContainer');
        const prevBtn = document.getElementById('prevResultBtn');
        const nextBtn = document.getElementById('nextResultBtn');
        const contBtn = document.getElementById('contBtn')
        const contSearchClave = document.getElementById('contSearchClave')
        const contSearchValor = document.getElementById('contSearchValor')
        const contFijoBtn = document.getElementById('contFijoBtn')

        const ocrPreview = {
            _objectURL: null,
            src: ocrImage
        };

        const PDF_RENDER_SCALE = 2;

        let fileGen = null;
        let listaDocumentos = [];
        let pdfRunTogether = true;
        let processingQueue = [];
        let processingResults = [];
        let currentIndex = 0;
        let listaContenidoBuscar = [];

        const fieldMap = { invoice_id: 'invoiceNumber', invoice_date: 'invoiceDate', supplier_tax_id: 'supplierNIF', total_amount: 'total', total: 'total' };

        function addSearchField(clave, valor) {
            // Evitar duplicados si es necesario, o simplemente añadir
            listaContenidoBuscar.push({ clave: clave, valor: valor });

            const input = document.createElement('input');
            input.type = 'text';
            input.id = `input_extra_${clave}`;
            input.name = clave;

            const label = document.createElement('label');
            label.innerText = clave;
            label.style = "color: #374151; font-size: 14px; font-weight: 600; margin-top: 8px;";

            confirmForm.appendChild(label);
            confirmForm.appendChild(input);
        }

        contBtn.addEventListener('click', () => {
            let clave = contSearchClave.value
            let valor = contSearchValor.value

            if (clave == '' || valor == '') {
                Swal.fire("Aviso", "Por favor rellene los campos clave y valor", "warning");
            } else {
                addSearchField(clave, valor);
                contSearchClave.value = '';
                contSearchValor.value = '';
            }
        })

        contFijoBtn.addEventListener('click', async () => {
            const { value: config } = await Swal.fire({
                title: 'Seleccione Configuración',
                input: 'select',
                inputOptions: {
                    'factura': 'Factura Estándar',
                    'contrato': 'Contrato de Trabajo'
                },
                inputPlaceholder: 'Seleccione una opción',
                showCancelButton: true,
                confirmButtonText: 'Aplicar',
                cancelButtonText: 'Cancelar'
            });

            if (config) {
                confirmForm.innerHTML = '<button type="button" id="downloadExcelBtn">Descargar CSV</button>';
                listaContenidoBuscar = [];

                if (config === 'factura') {
                    addSearchField('id_factura', 'Número o código identificativo de la factura');
                    addSearchField('base_imponible', 'Importe total antes de aplicar impuestos');
                    addSearchField('iban_pago', 'Código IBAN de la cuenta donde realizar el pago');
                    addSearchField('proveedor_nombre', 'Nombre legal o razón social de la empresa que emite la factura');
                    addSearchField('nif', 'Identificador unico de una empresa');
                    addSearchField('fecha', 'Fecha de la factura');
                    addSearchField('total', 'Total de la factura');
                } else if (config === 'contrato') {
                    addSearchField('nombre', 'Nombre y apellidos del trabajador');
                    addSearchField('dni', 'DNI del trabajador');
                    addSearchField('empresa', 'Nombre de la empresa');
                    addSearchField('remuneracion', 'Remuneración');
                    addSearchField('puesto_trabajo', 'Cargo o categoría profesional del trabajador');
                    addSearchField('num_ss', 'Número de la Seguridad Social del trabajador');
                    addSearchField('fecha_inicio', 'Fecha de inicio del contrato');
                    addSearchField('fecha_fin', 'Fecha de fin del contrato');
                }

                Swal.fire("Éxito", "Configuración aplicada correctamente", "success");
            }
        })

        async function pdfToImage(file, pageIndex = 0) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const page = await pdf.getPage(pageIndex + 1);

            const viewport = page.getViewport({ scale: PDF_RENDER_SCALE });

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;

            // convertir canvas a imagen
            const img = new Image();
            img.src = canvas.toDataURL("image/png");

            return img;
        }

        async function loadPreview(blob) {
            if (ocrPreview._objectURL) URL.revokeObjectURL(ocrPreview._objectURL);

            if (blob.type === "application/pdf") {

                const arrayBuffer = await blob.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                const page = await pdf.getPage(1);

                const scale = 4;
                const viewport = page.getViewport({ scale: PDF_RENDER_SCALE });

                const canvas = document.createElement("canvas");

                const ctx = canvas.getContext("2d");

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise;

                //Desacer cambio si es mejor usar conversor de pdf a image
                const imgData = canvas.toDataURL("image/png");
                ocrImage.src = imgData;
                ocrImage.style.display = "block";
                ocrCanvas.style.display = "none";

                await new Promise(resolve => {
                    ocrImage.onload = resolve;
                });

            } else {
                ocrPreview._objectURL = URL.createObjectURL(blob);

                ocrImage.src = ocrPreview._objectURL;
                ocrImage.style.display = "block";
                ocrCanvas.style.display = "none";

                await new Promise(resolve => {
                    ocrImage.onload = () => {
                        ocrImage.width = ocrImage.naturalWidth;
                        ocrImage.height = ocrImage.naturalHeight;
                        resolve();
                    };;
                });
            }
        }

        /* Extrae un listado de todos los campos del ocr y filtrarlos pos tipo de block */
        function extractOcrFieldsFromAgent(invoice, naturalW, naturalH, allowedTypes = null) {

            const out = [];

            if (!invoice || !Array.isArray(invoice.pages)) return out;

            invoice.pages.forEach((page) => {

                if (!Array.isArray(page.blocks)) return;

                page.blocks.forEach((block) => {

                    const text = (block.text || "").trim();
                    if (!text) return;

                    // 🔎 FILTRO POR TYPE
                    if (allowedTypes && !allowedTypes.includes(block.type)) return;

                    const poly = block.boundingPoly || block.bbox;
                    if (!poly) return;

                    let vertices = [];

                    if (Array.isArray(poly.vertices)) {
                        vertices = poly.vertices;
                    }

                    else if (Array.isArray(poly.normalizedVertices)) {
                        vertices = poly.normalizedVertices.map(v => ({
                            x: v.x * naturalW,
                            y: v.y * naturalH
                        }));
                    }

                    else if (Array.isArray(poly)) {
                        vertices = poly;
                    }

                    if (!vertices.length) return;

                    const xs = vertices.map(v => v.x || 0);
                    const ys = vertices.map(v => v.y || 0);

                    const left = Math.min(...xs);
                    const right = Math.max(...xs);
                    const top = Math.min(...ys);
                    const bottom = Math.max(...ys);

                    const width = right - left;
                    const height = bottom - top;

                    if (width <= 0 || height <= 0) return;

                    out.push({
                        key: block.type || "block",
                        value: text,
                        bbox: {
                            x: left,
                            y: top,
                            width,
                            height
                        }
                    });
                });
            });

            return out;
        }

        /* ----------------------------
           UI: selección de archivo + miniaturas PDF (manteniendo comportamiento anterior)
           ---------------------------- */
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            fileGen = null;
            listaDocumentos = [];
            processingQueue = [];
            processingResults = [];
            processingResults.length = 0;
            currentIndex = 0;

            if (!files.length) {
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            const pdfFiles = files.filter(f => f.type === "application/pdf");
            const imageFiles = files.filter(f => f.type.startsWith("image/"));

            // evitar mezcla
            if (pdfFiles.length && imageFiles.length) {
                Swal.fire("Aviso", "No puedes subir un PDF y una imagen al mismo tiempo.", "warning");
                fileInput.value = "";
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            // Validar tamaño total (20 MB)
            const totalSize = files.reduce((acc, f) => acc + f.size, 0);
            if (totalSize > 20 * 1024 * 1024) {
                Swal.fire("Aviso", "El total de los archivos supera el límite de 20 MB.", "warning");
                fileInput.value = "";
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            if (pdfFiles.length > 0) {
                fileGen = pdfFiles; // Ahora es un array de PDFs
                fileName.textContent = pdfFiles.length === 1 ? pdfFiles[0].name : `${pdfFiles.length} PDFs seleccionados`;
                processBtn.disabled = false;
                await selecionaPaginasPdf(pdfFiles);
                return;
            }

            if (imageFiles.length > 0) {
                fileGen = imageFiles; // array de imágenes
                fileName.textContent = imageFiles.length === 1 ? imageFiles[0].name : `${imageFiles.length} imágenes seleccionadas`;
                processBtn.disabled = false;
                return;
            }
        });

        /* función para seleccionar páginas del pdf (modal con miniaturas) */
        async function selecionaPaginasPdf(filesPdf) {
            Swal.fire({
                title: "Abriendo PDFs",
                text: "Generando miniaturas...",
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const container = document.createElement("div");
                container.style.maxHeight = "500px";
                container.style.overflow = "auto";
                container.style.padding = "10px";

                let totalPagesSelected = 0;
                const updateCounter = () => {
                    const counter = document.getElementById('pageCounter');
                    if (counter) counter.innerText = `Páginas seleccionadas: ${totalPagesSelected} / 15`;
                };

                for (let fIdx = 0; fIdx < filesPdf.length; fIdx++) {
                    const file = filesPdf[fIdx];
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                    const fileSection = document.createElement("div");
                    fileSection.style.marginBottom = "30px";
                    fileSection.style.padding = "15px";
                    fileSection.style.background = "#fff";
                    fileSection.style.borderRadius = "8px";
                    fileSection.style.border = "1px solid #E5E7EB";

                    fileSection.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #F3F4F6; padding-bottom: 8px;">
                            <h4 style="margin: 0; color: #111827; font-size: 16px;">${file.name}</h4>
                            <div style="display: flex; gap: 15px; background: #F9FAFB; padding: 5px 12px; border-radius: 6px; border: 1px solid #E5E7EB;">
                                <label style="font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #374151;">
                                    <input type="radio" name="pdfMode_${fIdx}" value="together" checked style="cursor: pointer;"> Juntar
                                </label>
                                <label style="font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #374151;">
                                    <input type="radio" name="pdfMode_${fIdx}" value="separate" style="cursor: pointer;"> Separar
                                </label>
                            </div>
                        </div>
                    `;

                    const thumbsContainer = document.createElement("div");
                    thumbsContainer.style.display = "flex";
                    thumbsContainer.style.flexWrap = "wrap";
                    thumbsContainer.style.gap = "10px";

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 0.2 });
                        const canvas = document.createElement("canvas");
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;

                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.dataset.fileIdx = fIdx;
                        checkbox.dataset.pageIdx = i - 1;
                        checkbox.style.display = "none";

                        const wrapper = document.createElement("div");
                        wrapper.className = "pdf-thumb-wrapper";
                        wrapper.style.border = "2px solid #ccc";
                        wrapper.style.padding = "6px";
                        wrapper.style.cursor = "pointer";
                        wrapper.style.borderRadius = "6px";
                        wrapper.style.display = "flex";
                        wrapper.style.flexDirection = "column";
                        wrapper.style.alignItems = "center";
                        wrapper.style.background = "#fff";

                        const label = document.createElement("div");
                        label.style.marginTop = "6px";
                        label.style.fontSize = "12px";
                        label.style.color = "#333";
                        label.innerText = `Página ${i}`;

                        wrapper.appendChild(canvas);
                        wrapper.appendChild(label);
                        wrapper.appendChild(checkbox);

                        wrapper.addEventListener("click", () => {
                            if (!checkbox.checked && totalPagesSelected >= 15) {
                                Swal.showValidationMessage("Límite máximo de 15 páginas alcanzado.");
                                setTimeout(() => Swal.resetValidationMessage(), 2000);
                                return;
                            }
                            checkbox.checked = !checkbox.checked;
                            totalPagesSelected += checkbox.checked ? 1 : -1;
                            wrapper.style.border = checkbox.checked ? "2px solid #007bff" : "2px solid #ccc";
                            wrapper.style.background = checkbox.checked ? "#e7f1ff" : "#fff";
                            updateCounter();
                        });

                        thumbsContainer.appendChild(wrapper);
                    }
                    fileSection.appendChild(thumbsContainer);
                    container.appendChild(fileSection);
                }

                const infoFooter = document.createElement("div");
                infoFooter.style.marginTop = "15px";
                infoFooter.style.padding = "10px";
                infoFooter.style.background = "#EFF6FF";
                infoFooter.style.borderRadius = "8px";
                infoFooter.style.border = "1px solid #DBEAFE";
                infoFooter.style.display = "flex";
                infoFooter.style.justifyContent = "center";
                infoFooter.style.alignItems = "center";
                infoFooter.innerHTML = `<div id="pageCounter" style="font-weight: 600; color: #2563EB; font-size: 14px;">Páginas seleccionadas: 0 / 15</div>`;

                const { value: result } = await Swal.fire({
                    title: "Selecciona páginas y modo por PDF",
                    html: "<div id='swalPlaceholder'></div>",
                    width: "90%",
                    showCancelButton: true,
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonText: "Confirmar Selección",
                    didOpen: () => {
                        const placeholder = Swal.getHtmlContainer().querySelector('#swalPlaceholder');
                        placeholder.appendChild(container);
                        placeholder.appendChild(infoFooter);
                    },
                    preConfirm: () => {
                        const checked = container.querySelectorAll("input[type='checkbox']:checked");
                        if (checked.length === 0) {
                            Swal.showValidationMessage("Selecciona al menos una página");
                            return false;
                        }
                        const selections = Array.from(checked).map(cb => {
                            const fIdx = parseInt(cb.dataset.fileIdx);
                            const mode = document.querySelector(`input[name="pdfMode_${fIdx}"]:checked`).value;
                            return {
                                fileIdx: fIdx,
                                pageIdx: parseInt(cb.dataset.pageIdx),
                                mode: mode
                            };
                        });
                        return selections;
                    }
                });

                if (result) {
                    listaDocumentos = result;
                } else {
                    // Si cancela, limpiamos para no permitir procesar una selección vacía
                    fileGen = null;
                    fileName.textContent = 'Ningún archivo seleccionado';
                    processBtn.disabled = true;
                }

            } catch (err) {
                console.error("Error generando miniaturas:", err);
                Swal.fire("Error", "No se pudo abrir el PDF.", "error");
                listaDocumentos = [];
            } finally {
                Swal.close();
            }
        }

        /* ----------------------------
           PROCESS: preparar cola y enviar a n8n
           ---------------------------- */
        processBtn.addEventListener('click', async () => {
            if (!listaContenidoBuscar.length) {
                Swal.fire("Aviso", "No has añadido ningun contenido a buscar", "warning");
                return;
            }

            fileInput.value = '';
            if (!fileGen) return;
            processingQueue = [];
            processingResults = [];

            try {
                // Si son PDFs seleccionados
                if (Array.isArray(fileGen) && fileGen[0].type === "application/pdf") {
                    if (!listaDocumentos.length) {
                        Swal.fire("Aviso", "No has seleccionado páginas.", "warning");
                        return;
                    }

                    // Agrupamos por archivo para no abrir el mismo PDF varias veces
                    const grouped = listaDocumentos.reduce((acc, sel) => {
                        if (!acc[sel.fileIdx]) acc[sel.fileIdx] = { pages: [], mode: sel.mode };
                        acc[sel.fileIdx].pages.push(sel.pageIdx);
                        return acc;
                    }, {});

                    for (const fIdx in grouped) {
                        const file = fileGen[fIdx];
                        const { pages, mode } = grouped[fIdx];
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                        if (mode === "together") {
                            const canvas = document.createElement("canvas");
                            const ctx = canvas.getContext("2d");
                            let maxWidth = 0;
                            let totalHeight = 0;
                            const pagesImages = [];

                            for (const pIdx of pages) {
                                const page = await pdf.getPage(pIdx + 1);
                                const viewport = page.getViewport({ scale: PDF_RENDER_SCALE });
                                const pageCanvas = document.createElement("canvas");
                                pageCanvas.width = viewport.width;
                                pageCanvas.height = viewport.height;
                                await page.render({ canvasContext: pageCanvas.getContext("2d"), viewport }).promise;
                                pagesImages.push(pageCanvas);
                                maxWidth = Math.max(maxWidth, viewport.width);
                                totalHeight += viewport.height;
                            }

                            canvas.width = maxWidth;
                            canvas.height = totalHeight;
                            let offsetY = 0;
                            for (const pc of pagesImages) {
                                ctx.drawImage(pc, 0, offsetY);
                                offsetY += pc.height;
                            }

                            const imgBlob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.8));
                            console.log(`Documento preparado: ${file.name}, Tamaño: ${(imgBlob.size / 1024 / 1024).toFixed(2)} MB`);
                            processingQueue.push({
                                blob: imgBlob,
                                name: file.name.replace(/\.pdf$/i, '') + "_seleccion.jpg",
                                sourceType: "image",
                                meta: { originalName: file.name }
                            });
                        } else {
                            // Por separado
                            for (const pIdx of pages) {
                                const page = await pdf.getPage(pIdx + 1);
                                const viewport = page.getViewport({ scale: PDF_RENDER_SCALE });
                                const canvas = document.createElement("canvas");
                                const ctx = canvas.getContext("2d");
                                canvas.width = viewport.width;
                                canvas.height = viewport.height;
                                await page.render({ canvasContext: ctx, viewport }).promise;

                                const imgBlob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.8));
                                console.log(`Página preparada: ${file.name} p${pIdx + 1}, Tamaño: ${(imgBlob.size / 1024 / 1024).toFixed(2)} MB`);
                                processingQueue.push({
                                    blob: imgBlob,
                                    name: file.name.replace(/\.pdf$/i, '') + `_p${pIdx + 1}.jpg`,
                                    sourceType: "image",
                                    meta: { originalName: file.name, pageIndex: pIdx }
                                });
                            }
                        }
                    }
                } else if (Array.isArray(fileGen)) {
                    // Caso de imágenes
                    fileGen.forEach(imgFile => {
                        processingQueue.push({
                            blob: imgFile,
                            name: imgFile.name,
                            sourceType: "image",
                            meta: { originalName: imgFile.name }
                        });
                    });
                }
            } catch (err) {
                console.error("Error preparando documentos:", err);
                Swal.fire("Error", "No se pudieron preparar los documentos.", "error");
                return;
            }

            if (!processingQueue.length) {
                Swal.fire("Nada que procesar", "No hay documentos seleccionados.", "info");
                return;
            }

            // Modal progreso
            const progressHtml = document.createElement('div');
            progressHtml.style.textAlign = "center";
            progressHtml.innerHTML = `
                                <div class="spinner" style="margin: 10px auto;"></div>
                                <div style="margin-top:12px;">
                                    <div id="progressText">Procesando 0 / ${processingQueue.length}</div>
                                    <div id="progressDetail" style="font-size:12px;color:#666;margin-top:6px;"></div>
                                </div>
                            `;
            Swal.fire({ title: "Procesando documentos", html: progressHtml, allowOutsideClick: false, allowEscapeKey: false, showConfirmButton: false });

            // enviar cada item a n8n (local por defecto)
            for (let i = 0; i < processingQueue.length; i++) {
                const item = processingQueue[i];
                const progressText = document.getElementById('progressText');
                const progressDetail = document.getElementById('progressDetail');
                if (progressText) progressText.innerText = `Procesando ${i + 1} / ${processingQueue.length}`;
                if (progressDetail) progressDetail.innerText = `Enviando ${item.name}...`;

                const formData = new FormData();
                formData.append('file', item.blob, item.name);
                formData.append('originalName', item.meta.originalName || '');
                formData.append('pageIndex', (item.meta.pageIndex ?? ''));

                const searchStrings = listaContenidoBuscar.map(i => `"${i.clave}":"${i.valor}"`);
                formData.append('listaContenidoBuscar', searchStrings);

                console.log(listaContenidoBuscar)
                try {
                    let res;

                    /*try {
                        res = await fetch(N8N_LOCAL, { method: "POST", body: formData });
                    } catch (e) {
                        console.warn("Local webhook falló, usando remoto...");
                    }*/

                    if (!res || !res.ok) {
                        res = await fetch(N8N_WEBHOOK_URL, { method: "POST", body: formData });
                    }

                    const text = await res.text();

                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch {
                        data = { raw: text };
                    }

                    processingResults.push({
                        queueIndex: i,
                        name: item.name,
                        response: data,
                        blob: item.blob
                    });

                    if (progressDetail) progressDetail.innerText = `Procesado: ${item.name}`;

                    // Añadimos un pequeño retardo de 800ms antes del siguiente para no saturar
                    if (i < processingQueue.length - 1) {
                        await new Promise(resolve => setTimeout(resolve, 800));
                    }

                } catch (err) {

                    console.error("Error procesando item:", item, err);

                    processingResults.push({
                        queueIndex: i,
                        name: item.name,
                        response: { error: String(err) },
                        blob: item.blob
                    });

                    if (progressDetail) progressDetail.innerText = `Error procesando ${item.name}`;
                }
            }

            Swal.close();
            if (processingResults.length > 0) {
                showResultsInDiv(processingResults);
            } else {
                Swal.fire("Terminado", "No se han obtenido resultados.", "info");
            }
        });

        /* ----------------------------
           Mostrar resultados + overlays + drag&drop (usando funciones robustas)
           ---------------------------- */
        function showResultsInDiv(results) {
            processingResults = results;
            currentIndex = 0;
            resultsContainer.classList.remove('hidden');
            renderIndex(0);
        }

        function setInputValueForKey(key, value) {
            if (!key) return;

            // 1️⃣ Si está en el fieldMap
            const mappedId = fieldMap[key];
            if (mappedId) {
                const input = document.getElementById(mappedId);
                if (input) {
                    input.value = value;
                    return;
                }
            }

            // 2️⃣ Intentar por name o id directo
            let input = document.getElementById(key);
            if (!input) {
                input = document.querySelector(`#confirmForm input[name="${key}"]`);
            }

            if (input) {
                input.value = value;
            }
        }

        function drawOverlays(invoice, targetEl) {
            overlayContainer.innerHTML = '';

            const rect = targetEl.getBoundingClientRect();
            const naturalW = targetEl.naturalWidth || targetEl.width;
            const naturalH = targetEl.naturalHeight || targetEl.height;

            const scaleX = rect.width / naturalW;
            const scaleY = rect.height / naturalH;

            const ocrFields = extractOcrFieldsFromAgent(invoice, naturalW, naturalH, ['FORM_FIELD']) || [];

            ocrFields.forEach(f => {
                if (!f.bbox) return;

                const box = document.createElement('div');
                box.className = 'ocr-box';

                const x = f.bbox.x * scaleX;
                const y = f.bbox.y * scaleY;
                const w = f.bbox.width * scaleX;
                const h = f.bbox.height * scaleY;

                box.style.left = `${x}px`;
                box.style.top = `${y}px`;
                box.style.width = `${w}px`;
                box.style.height = `${h}px`;

                box.title = f.value || '';
                box.draggable = true;

                box.addEventListener('dragstart', ev => {
                    ev.dataTransfer.setData('text/plain', f.value ?? '');
                    ev.dataTransfer.setData('application/json', JSON.stringify({ key: f.key, value: f.value }));
                });

                box.addEventListener('click', () => setInputValueForKey(f.key, f.value));

                overlayContainer.appendChild(box);
            });
        }

        async function renderIndex(i) {
            confirmForm.classList.add('hidden');
            //lineItemsTbody.innerHTML = '';
            overlayContainer.innerHTML = '';

            if (!processingResults || !processingResults.length) return;
            if (i < 0) i = 0;
            if (i >= processingResults.length) i = processingResults.length - 1;

            const r = processingResults[i];
            if (!r || !r.name) return;

            currentIndex = i;
            resultInfo.innerText = `${i + 1} / ${processingResults.length} — ${r.name || 'Sin nombre'}`;

            console.log("Renderizando resultado", i, r.name);
            console.log("listaContenidoBuscar actual:", listaContenidoBuscar);
            console.log("Respuesta recibida:", r.response);

            await loadPreview(r.blob);
            await new Promise(resolve => requestAnimationFrame(resolve));

            let targetEl, naturalW, naturalH;

            if (ocrImage.style.display !== 'none') {
                targetEl = ocrImage;
            } else {
                targetEl = ocrCanvas;
                ocrCanvas.style.display = "block";
                ocrImage.style.display = "none";
            }

            overlayContainer.style.position = 'absolute';
            overlayContainer.style.left = `0px`;
            overlayContainer.style.top = `0px`;

            overlayContainer.style.width = `${targetEl.width}px`;
            overlayContainer.style.height = `${targetEl.height}px`;
            overlayContainer.style.transform = 'none';
            overlayContainer.style.pointerEvents = 'auto';

            // Solo llamamos a drawOverlays para posicionar boxes
            let invoice = r.response;
            if (Array.isArray(invoice)) invoice = invoice[0];

            drawOverlays(invoice, targetEl);


            if (invoice.buscarCampos && invoice.buscarCampos.length > 0) {
                listaContenidoBuscar.forEach(item => {
                    let val = invoice.buscarCampos[0][item.clave] ?? '';
                    //console.log(`Buscando ${item.clave}:`, val);

                    const inputExtra = document.getElementById(`input_extra_${item.clave}`);
                    if (inputExtra) {
                        inputExtra.value = val;
                    }
                });
            }

            // Limpiar avisos de servidor previos
            const oldErrors = confirmForm.querySelectorAll('.server-error-msg');
            oldErrors.forEach(e => e.remove());

            // Mostrar error del servidor si existe
            if (invoice.error_message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = "server-error-msg bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-4 mb-4 text-xs";
                errorDiv.innerHTML = `<p class="font-bold">Aviso del Servidor:</p><p>${invoice.error_message}</p>`;
                confirmForm.prepend(errorDiv);
            }
            confirmForm.classList.remove('hidden');
        }

        /* Botones para cambiar de documento */
        prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; renderIndex(currentIndex); } };
        nextBtn.onclick = () => { if (currentIndex < processingResults.length - 1) { currentIndex++; renderIndex(currentIndex); } };

        /* Descargar CSV */
        document.getElementById('downloadExcelBtn').addEventListener('click', () => {
            if (!processingResults.length) {
                Swal.fire("Aviso", "No hay datos para descargar", "warning");
                return;
            }

            const headers = listaContenidoBuscar.map(i => i.clave);
            const csvData = [headers];

            processingResults.forEach(r => {
                let invoice = r.response;
                if (Array.isArray(invoice)) invoice = invoice[0];

                const row = headers.map(h => {
                    // Accedemos a los campos buscados en la respuesta de cada documento
                    return (invoice.buscarCampos && invoice.buscarCampos[0])
                        ? (invoice.buscarCampos[0][h] ?? '')
                        : '';
                });
                csvData.push(row);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(csvData);
            XLSX.utils.book_append_sheet(wb, ws, 'Resultados');

            // Forzamos la descarga como CSV usando SheetJS
            XLSX.writeFile(wb, 'facturas_procesadas.csv', { bookType: 'csv', FS: ';' });
        });

        const documentWrapper = document.getElementById('documentWrapper');
        new ResizeObserver(() => {
            if (processingResults.length) renderIndex(currentIndex);
        }).observe(documentWrapper);
    </script>
</body>
