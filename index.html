<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo · Automatización de Facturas</title>
    <link rel="stylesheet" href="https://facturas-demo.onrender.com/styles2.css" />
</head>

<body>

    <div class="container">
        <h1>Automatización de Facturas</h1>
        <p class="subtitle">
            Sube una factura (PDF o imagen) y obtén automáticamente los datos contables.
        </p>

        <div class="upload-card">
            <input type="file" id="fileInput" accept=".pdf,image/*" hidden />
            <label for="fileInput" class="upload-button">
                📄 Subir factura
            </label>

            <p id="fileName" class="file-name">Ningún archivo seleccionado</p>

            <button id="processBtn" disabled>
                Procesar factura
            </button>
        </div>

        <div id="result" class="result hidden">
            <h2>Resultado</h2>

            <div>
                <p>Factura Nº: <span id="invoiceNumber"></span></p>
                <p>Fecha: <span id="invoiceDate"></span></p>
                <p>NIF: <span id="supplierNIF"></span></p>
                <p>Total: <span id="total"></span></p>
            </div>

            <h3>Line Items</h3>
            <table id="lineItemsTable">
                <thead>
                    <tr>
                        <th>Descripción</th>
                        <th>Cantidad</th>
                        <th>Precio Unitario</th>
                        <th>IVA (%)</th>
                        <th>IVA (€)</th>
                        <th>Total (€)</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <footer>
            <span>Demo técnica · No se almacenan documentos</span>
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        //Cambiar por la url real de n8n publicada
        const N8N_WEBHOOK_URL = "https://n8n-facturas-demo.onrender.com/webhook/n8n-demo";
        const RED_LOCAL = "http://localhost:5678/webhook-test/n8n-demo";

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileName.textContent = fileInput.files[0].name;
                processBtn.disabled = false;
            } else {
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
            }
        });

        processBtn.addEventListener('click', () => {
            let file = fileInput.files[0]
            conectionWorkflow(file)
        })

        async function conectionWorkflow(file) {
            const formData = new FormData()
            formData.append('file', file)

            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: "POST",
                    body: formData
                });
                
                console.log("Status:" + res.status)

                const text = await res.text()
                console.log(text)
                if (!text) {
                    console.log("Respuesta vacia del servidor")
                    return
                }

                const data = JSON.parse(text)
                const invoice = Array.isArray(data) ? data[0] : data;
                showInvoiceOnPage(invoice)
            } catch (error) {
                console.log("Error: " + error);
                alert("No se pudo procesar la factura")
            }
        }

        function formatMoney(n) {
            if (n === null || n === undefined || isNaN(n)) return "-";
            return Number(n).toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
        }

        function safeNum(n) {
            if (n === null || n === undefined) return null;
            const v = Number(n);
            return isNaN(v) ? null : v;
        }

        function showInvoiceOnPage(data) {
            // Si te pasan un array, tomar el primer elemento
            const invoice = Array.isArray(data) ? data[0] : data;

            // Cabecera / meta
            document.getElementById('invoiceNumber').textContent = invoice.invoice_number || '-';
            document.getElementById('invoiceDate').textContent = invoice.invoice_date || '-';
            document.getElementById('supplierNIF').textContent = invoice.supplier_nif || '-';

            // Totales visibles
            const subtotal = safeNum(invoice.subtotal);
            const tax_total = safeNum(invoice.tax_total);
            const total = safeNum(invoice.total);

            document.getElementById('total').textContent = formatMoney(total);

            // Si quieres mostrar subtotal / IVA también (añade elementos en HTML si no existen)
            // Ejemplo: <span id="subtotal"></span> <span id="taxTotal"></span>
            if (document.getElementById('subtotal')) {
                document.getElementById('subtotal').textContent = formatMoney(subtotal);
            }
            if (document.getElementById('taxTotal')) {
                document.getElementById('taxTotal').textContent = formatMoney(tax_total);
            }

            // Tabla line items
            const tbody = document.querySelector('#lineItemsTable tbody');
            tbody.innerHTML = ''; // limpiar antes de rellenar

            if (invoice.line_items && invoice.line_items.length > 0) {
                invoice.line_items.forEach(item => {
                    // normalizar campos
                    const desc = item.description ? String(item.description).trim() : '-';
                    const qty = (item.quantity !== null && item.quantity !== undefined) ? item.quantity : '-';
                    const unit = safeNum(item.unit_price);
                    const vat_rate = (item.vat_rate !== null && item.vat_rate !== undefined) ? item.vat_rate : '-';
                    const vat_amount = safeNum(item.vat_amount);
                    const line_total = safeNum(item.line_total_incl ?? item.line_total ?? item.line_total_incl);

                    const tr = document.createElement('tr');

                    // create cells with data-label for mobile friendly layout
                    const tdDesc = document.createElement('td');
                    tdDesc.setAttribute('data-label', 'Descripción');
                    tdDesc.textContent = desc;

                    const tdQty = document.createElement('td');
                    tdQty.setAttribute('data-label', 'Cantidad');
                    tdQty.textContent = qty;

                    const tdUnit = document.createElement('td');
                    tdUnit.setAttribute('data-label', 'Precio unitario');
                    tdUnit.textContent = unit !== null ? formatMoney(unit) : '-';

                    const tdVatRate = document.createElement('td');
                    tdVatRate.setAttribute('data-label', 'IVA (%)');
                    tdVatRate.textContent = vat_rate === '-' ? '-' : String(vat_rate);

                    const tdVatAmount = document.createElement('td');
                    tdVatAmount.setAttribute('data-label', 'IVA (€)');
                    tdVatAmount.textContent = vat_amount !== null ? formatMoney(vat_amount) : '-';

                    const tdTotal = document.createElement('td');
                    tdTotal.setAttribute('data-label', 'Total (€)');
                    tdTotal.textContent = line_total !== null ? formatMoney(line_total) : '-';

                    tr.appendChild(tdDesc);
                    tr.appendChild(tdQty);
                    tr.appendChild(tdUnit);
                    tr.appendChild(tdVatRate);
                    tr.appendChild(tdVatAmount);
                    tr.appendChild(tdTotal);

                    tbody.appendChild(tr);
                });
            } else {
                // Mensaje cuando no hay items
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.setAttribute('colspan', 6);
                td.textContent = 'No se han detectado líneas de producto.';
                td.style.textAlign = 'center';
                tr.appendChild(td);
                tbody.appendChild(tr);
            }

            // mostrar
            document.getElementById('result').classList.remove('hidden');
        }

    </script>

</body>

</html>
