<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo · Confirmación de Factura</title>
    <style>
        /* --- CSS BASE --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 16px;
        }

        .upload-card,
        .result,
        #confirmForm {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .upload-button,
        button {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            border: none;
        }

        .upload-button:hover,
        button:hover {
            background: #1e40af;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .file-name {
            margin: 12px 0;
            font-size: 14px;
            color: #6b7280;
        }

        #confirmForm {
            display: grid;
            gap: 12px;
        }

        #confirmForm .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        #confirmForm label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            color: #374151;
        }

        #confirmForm input {
            padding: 6px 8px;
            font-size: 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 100%;
        }

        #lineItemsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            table-layout: fixed;
        }

        #lineItemsTable th,
        #lineItemsTable td {
            padding: 8px 6px;
            border: 1px solid #e6e6e6;
            text-align: left;
            font-size: 13px;
        }

        #lineItemsTable input {
            width: 100%;
            padding: 4px 6px;
            font-size: 13px;
            border-radius: 4px;
        }

        @media (max-width: 1024px) {
            .container {
                padding: 10px;
            }

            #lineItemsTable {
                display: block;
                overflow-x: auto;
            }
        }

        #loader {
            display: none;
            text-align: center;
            margin: 24px 0;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* results layout */
        #resultsContainer {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-top: 20px;
        }

        #documentSide {
            flex: 1;
            min-width: 420px;
            position: relative;
        }

        #documentWrapper {
            position: relative;
            display: inline-block;
        }

        #documentSide img {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            display: block;
        }

        #overlayContainer {
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #formSide {
            width: 420px;
        }

        .ocr-box {
            position: absolute;
            border: 2px solid rgba(0, 123, 255, 0.9);
            background: rgba(0, 123, 255, 0.12);
            color: #003366;
            font-size: 12px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 2px;
            cursor: pointer;
            pointer-events: auto;
            box-sizing: border-box;
        }

        .ocr-chip {
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: grab;
            margin: 4px;
            display: inline-block;
        }

        .ocr-chip-container {
            max-width: 100%;
            overflow-x: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .hidden {
            display: none;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Confirmación de Factura</h1>

        <div class="upload-card">
            <input type="file" id="fileInput" accept=".pdf,image/*" multiple hidden>
            <p>Máximo 15 páginas, 20 MB como máximo</p>
            <label for="fileInput" class="upload-button">📄 Subir factura</label>
            <p id="fileName" class="file-name">Ningún archivo seleccionado</p>
            <button id="processBtn" disabled>Procesar factura</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p>Procesando factura, por favor espere...</p>
        </div>

        <div style="margin-top:14px; display:flex; gap:8px;flex-direction: row-reverse;">
            <button id="nextResultBtn">Siguiente</button>
            <button id="prevResultBtn">Anterior</button>
        </div>

        <div id="resultsContainer" class="hidden">
            <div id="documentSide">
                <div id="documentWrapper" style="position:relative">
                    <img id="ocrImage" alt="Documento procesado" style="display:none;">
                    <canvas id="ocrCanvas" style="display:none;"></canvas>
                    <div id="overlayContainer"></div>
                </div>
            </div>

            <div id="formSide">
                <div id="resultInfo" style="margin-bottom:10px; font-weight:bold;"></div>

                <form id="confirmForm" class="hidden">
                    <input id="invoiceNumber" placeholder="Invoice Number"><br>
                    <input id="invoiceDate" placeholder="Invoice Date"><br>
                    <input id="supplierNIF" placeholder="Supplier NIF"><br>
                    <input id="total" placeholder="Total"><br>

                    <table id="lineItemsTable">
                        <thead>
                            <tr>
                                <th>Descripción</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>

                    <br>
                    <button type="button" id="downloadExcelBtn">Descargar Excel</button>
                </form>
            </div>
        </div>

        <div class="footer-note">Arrastra o haz click sobre un overlay/chip para rellenar un campo.</div>
    </div>

    <!-- Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        /* ----------------------------
           CONFIG
           ---------------------------- */
        const N8N_WEBHOOK_URL = "https://n8n.neo-n8n.com/webhook/google-doc-ai"; // remoto
        const N8N_LOCAL = "http://localhost:5678/webhook-test/google-doc-ai"; // local dev

        /* ----------------------------
           DOM refs + estado
           ---------------------------- */
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const loader = document.getElementById('loader');
        const confirmForm = document.getElementById('confirmForm');

        const ocrImage = document.getElementById('ocrImage');
        const ocrCanvas = document.getElementById('ocrCanvas');

        const overlayContainer = document.getElementById('overlayContainer');
        const resultInfo = document.getElementById('resultInfo');
        const lineItemsTbody = document.querySelector('#lineItemsTable tbody');
        const resultsContainer = document.getElementById('resultsContainer');
        const prevBtn = document.getElementById('prevResultBtn');
        const nextBtn = document.getElementById('nextResultBtn');

        const ocrPreview = {
            _objectURL: null,
            src: ocrImage
        };

        let fileGen = null;
        let listaDocumentos = [];
        let pdfRunTogether = true;
        let processingQueue = [];
        let processingResults = [];
        let currentIndex = 0;

        /* mapping simple para inputs */
        const fieldMap = { invoice_id: 'invoiceNumber', invoice_date: 'invoiceDate', supplier_tax_id: 'supplierNIF', total_amount: 'total', total: 'total' };

        /* ----------------------------
           HELPERS: bounding normalization (soporta varios formatos)
           ---------------------------- */
        function normalizeBboxToPixels(bbox, naturalW, naturalH) {
            if (!bbox) return null;

            // normalizedVertices
            if (Array.isArray(bbox.normalizedVertices) && bbox.normalizedVertices.length) {
                const verts = bbox.normalizedVertices;
                const xs = verts.map(v => (v.x ?? 0) * naturalW);
                const ys = verts.map(v => (v.y ?? 0) * naturalH);
                const left = Math.min(...xs), top = Math.min(...ys);
                return { x: left, y: top, width: Math.max(...xs) - left, height: Math.max(...ys) - top };
            }

            // vertices absolute array
            if (Array.isArray(bbox.vertices) && bbox.vertices.length) {
                const verts = bbox.vertices;
                const xs = verts.map(v => v.x ?? 0);
                const ys = verts.map(v => v.y ?? 0);
                const left = Math.min(...xs), top = Math.min(...ys);
                return { x: left, y: top, width: Math.max(...xs) - left, height: Math.max(...ys) - top };
            }

            // left/top/right/bottom or left/top/width/height
            if ('left' in bbox && 'top' in bbox) {
                const left = bbox.left;
                const top = bbox.top;
                const width = ('width' in bbox) ? bbox.width : (('right' in bbox) ? bbox.right - bbox.left : 0);
                const height = ('height' in bbox) ? bbox.height : (('bottom' in bbox) ? bbox.bottom - bbox.top : 0);
                if (left <= 1 && top <= 1 && width <= 1 && height <= 1) return { x: left * naturalW, y: top * naturalH, width: width * naturalW, height: height * naturalH };
                return { x: left, y: top, width, height };
            }

            // x,y,width,height (maybe normalized)
            if ('x' in bbox && 'y' in bbox && ('width' in bbox || 'w' in bbox)) {
                const w = bbox.width ?? bbox.w;
                const h = bbox.height ?? bbox.h ?? 0;
                if (bbox.x <= 1 && bbox.y <= 1 && w <= 1 && h <= 1) {
                    return { x: bbox.x * naturalW, y: bbox.y * naturalH, width: w * naturalW, height: h * naturalH };
                }
                return { x: bbox.x, y: bbox.y, width: w, height: h };
            }

            // x1,y1,x2,y2
            if ('x1' in bbox && 'y1' in bbox && 'x2' in bbox && 'y2' in bbox) {
                const left = bbox.x1, top = bbox.y1, width = bbox.x2 - bbox.x1, height = bbox.y2 - bbox.y1;
                if (left <= 1 && top <= 1 && width <= 1 && height <= 1) {
                    return { x: left * naturalW, y: top * naturalH, width: width * naturalW, height: height * naturalH };
                }
                return { x: left, y: top, width, height };
            }

            return null;
        }

        async function pdfToImage(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const page = await pdf.getPage(1);

            const scale = 3;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;

            // convertir canvas a imagen
            const img = new Image();
            img.src = canvas.toDataURL("image/png");

            return img;
        }

        async function loadPreview(blob) {
            if (ocrPreview._objectURL) URL.revokeObjectURL(ocrPreview._objectURL);

            if (blob.type === "application/pdf") {

                const arrayBuffer = await blob.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                const page = await pdf.getPage(1);

                const scale = 4;
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise;

                const imgData = canvas.toDataURL("image/png");

                ocrImage.src = imgData;
                ocrImage.style.display = "block";
                ocrCanvas.style.display = "none";

                await new Promise(resolve => {
                    ocrImage.onload = resolve;
                });

            } else {

                ocrPreview._objectURL = URL.createObjectURL(blob);

                ocrImage.src = ocrPreview._objectURL;
                ocrImage.style.display = "block";
                ocrCanvas.style.display = "none";

                await new Promise(resolve => {
                    if (ocrImage.complete) resolve();
                    else ocrImage.onload = resolve;
                });
            }
        }

        /* Extrae un listado de todos los campos del ocr y filtrarlos pos tipo de block */
        function extractOcrFieldsFromAgent(invoice, naturalW, naturalH, allowedTypes = null) {

            const out = [];

            if (!invoice || !Array.isArray(invoice.pages)) return out;

            invoice.pages.forEach((page) => {

                if (!Array.isArray(page.blocks)) return;

                page.blocks.forEach((block) => {

                    const text = (block.text || "").trim();
                    if (!text) return;

                    // 🔎 FILTRO POR TYPE
                    if (allowedTypes && !allowedTypes.includes(block.type)) return;

                    const poly = block.boundingPoly || block.bbox;
                    if (!poly) return;

                    let vertices = [];

                    if (Array.isArray(poly.vertices)) {
                        vertices = poly.vertices;
                    }

                    else if (Array.isArray(poly.normalizedVertices)) {
                        vertices = poly.normalizedVertices.map(v => ({
                            x: v.x,
                            y: v.y
                        }));
                    }

                    else if (Array.isArray(poly)) {
                        vertices = poly;
                    }

                    if (!vertices.length) return;

                    const xs = vertices.map(v => v.x || 0);
                    const ys = vertices.map(v => v.y || 0);

                    const left = Math.min(...xs);
                    const right = Math.max(...xs);
                    const top = Math.min(...ys);
                    const bottom = Math.max(...ys);

                    const width = right - left;
                    const height = bottom - top;

                    if (width <= 0 || height <= 0) return;

                    out.push({
                        key: block.type || "block",
                        value: text,
                        bbox: {
                            x: left,
                            y: top,
                            width,
                            height
                        }
                    });
                });
            });

            return out;
        }

        /* ----------------------------
           UI: selección de archivo + miniaturas PDF (manteniendo comportamiento anterior)
           ---------------------------- */
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            fileGen = null;
            listaDocumentos = [];
            processingQueue = [];
            processingResults = [];
            processingResults.length = 0;
            currentIndex = 0;

            if (!files.length) {
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            const pdfFiles = files.filter(f => f.type === "application/pdf");
            const imageFiles = files.filter(f => f.type.startsWith("image/"));

            // evitar mezcla
            if (pdfFiles.length && imageFiles.length) {
                Swal.fire("Aviso", "No puedes subir un PDF y una imagen al mismo tiempo.", "warning");
                fileInput.value = "";
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            if (pdfFiles.length > 1) {
                Swal.fire("Aviso", "Solo puedes subir un PDF a la vez.", "warning");
                fileInput.value = "";
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            if (pdfFiles.length === 1) {
                fileGen = pdfFiles[0];

                // Validar tamaño máximo 20 MB
                if (fileGen.size > 20 * 1024 * 1024) {
                    Swal.fire("Aviso", "El PDF supera el tamaño máximo de 20 MB.", "warning");
                    fileInput.value = "";
                    fileName.textContent = 'Ningún archivo seleccionado';
                    processBtn.disabled = true;
                    return;
                }

                fileName.textContent = fileGen.name;
                processBtn.disabled = false;
                await selecionaPaginasPdf(fileGen);
                return;
            }

            if (imageFiles.length > 0) {
                let type = "image";
                fileGen = imageFiles; // array de imágenes
                fileName.textContent = imageFiles.map(f => f.name).join(", ");
                processBtn.disabled = false;
                return;
            }
        });

        /* función para seleccionar páginas del pdf (modal con miniaturas) */
        async function selecionaPaginasPdf(filePdf) {
            Swal.fire({
                title: "Abriendo PDF",
                text: "Generando miniaturas...",
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const arrayBuffer = await filePdf.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                const container = document.createElement("div");
                container.style.display = "flex";
                container.style.flexWrap = "wrap";
                container.style.gap = "10px";
                container.style.maxHeight = "420px";
                container.style.overflow = "auto";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.2 });
                    const canvas = document.createElement("canvas");
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = i;
                    checkbox.style.display = "none";

                    const wrapper = document.createElement("div");
                    wrapper.style.border = "2px solid #ccc";
                    wrapper.style.padding = "6px";
                    wrapper.style.cursor = "pointer";
                    wrapper.style.borderRadius = "6px";
                    wrapper.style.display = "flex";
                    wrapper.style.flexDirection = "column";
                    wrapper.style.alignItems = "center";
                    wrapper.style.background = "#fff";

                    const label = document.createElement("div");
                    label.style.marginTop = "6px";
                    label.style.fontSize = "12px";
                    label.style.color = "#333";
                    label.innerText = `Página ${i}`;

                    wrapper.appendChild(canvas);
                    wrapper.appendChild(label);
                    wrapper.appendChild(checkbox);

                    wrapper.addEventListener("click", () => {
                        checkbox.checked = !checkbox.checked;
                        wrapper.style.border = checkbox.checked ? "2px solid #007bff" : "2px solid #ccc";
                        wrapper.style.background = checkbox.checked ? "#e7f1ff" : "#fff";
                    });

                    container.appendChild(wrapper);
                }

                const modeContainer = document.createElement("div");
                modeContainer.style.marginTop = "12px";
                modeContainer.innerHTML = `
                                    <label style="margin-right:10px;">
                                        <input type="radio" name="pdfMode" value="together" checked> Ejecutar páginas juntas
                                    </label>
                                    <label>
                                        <input type="radio" name="pdfMode" value="separate"> Ejecutar páginas por separado
                                    </label>
                                `;

                const { value: result } = await Swal.fire({
                    title: "Selecciona páginas y modo de ejecución",
                    html: "<div id='swalPlaceholder'></div>",
                    width: "85%",
                    showCancelButton: true,
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonText: "Aceptar",
                    didOpen: () => {
                        const htmlContainer = Swal.getHtmlContainer();
                        const placeholder = htmlContainer.querySelector('#swalPlaceholder');
                        placeholder.appendChild(container);
                        placeholder.appendChild(modeContainer);
                    },
                    preConfirm: () => {
                        const checked = container.querySelectorAll("input:checked");
                        if (checked.length === 0) { Swal.showValidationMessage("Selecciona al menos una página"); return false; }
                        const pages = Array.from(checked).map(cb => parseInt(cb.value));
                        const mode = modeContainer.querySelector('input[name="pdfMode"]:checked').value;
                        return { pages, mode };
                    }
                });

                if (result) {
                    listaDocumentos = result.pages.map(p => p - 1);
                    pdfRunTogether = result.mode === "together";
                }

            } catch (err) {
                console.error("Error generando miniaturas:", err);
                Swal.fire("Error", "No se pudo abrir el PDF.", "error");
                listaDocumentos = [];
            } finally {
                Swal.close();
            }
        }

        /* ----------------------------
           PROCESS: preparar cola y enviar a n8n
           ---------------------------- */
        processBtn.addEventListener('click', async () => {
            fileInput.value = '';
            if (!fileGen) return;
            processingQueue = [];
            processingResults = [];

            // Construir cola: varias imágenes o PDF(páginas o conjunto)
            if (Array.isArray(fileGen)) {
                fileGen.forEach(imgFile => processingQueue.push({ blob: imgFile, name: imgFile.name, sourceType: "image", meta: { originalName: imgFile.name } }));
            } else if (fileGen.type === "application/pdf") {
                if (!listaDocumentos.length) {
                    Swal.fire("Aviso", "No has seleccionado páginas para el PDF.", "warning");
                    return;
                }
                try {
                    const arrayBuffer = await fileGen.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

                    if (pdfRunTogether) {
                        const newPdf = await PDFLib.PDFDocument.create();
                        const copiedPages = await newPdf.copyPages(pdfDoc, listaDocumentos);
                        copiedPages.forEach(p => newPdf.addPage(p));
                        const bytes = await newPdf.save();
                        const blob = new Blob([bytes], { type: "application/pdf" });
                        processingQueue.push({ blob, name: fileGen.name.replace(/\.pdf$/i, '') + "_seleccion.pdf", sourceType: "pdf", meta: { originalName: fileGen.name } });
                    } else {
                        for (const pageIndex of listaDocumentos) {
                            const newPdf = await PDFLib.PDFDocument.create();
                            const [copied] = await newPdf.copyPages(pdfDoc, [pageIndex]);
                            newPdf.addPage(copied);
                            const bytes = await newPdf.save();
                            const blob = new Blob([bytes], { type: "application/pdf" });
                            processingQueue.push({ blob, name: fileGen.name.replace(/\.pdf$/i, '') + `_p${pageIndex + 1}.pdf`, sourceType: "pdf-page", meta: { originalName: fileGen.name, pageIndex } });
                        }
                    }
                } catch (err) {
                    console.error("Error creando PDFs:", err);
                    Swal.fire("Error", "No se pudo preparar el PDF.", "error");
                    return;
                }
            } else {
                Swal.fire("Tipo no soportado", "Solo PDFs e imágenes son soportados.", "warning");
                return;
            }

            if (!processingQueue.length) {
                Swal.fire("Nada que procesar", "No hay documentos en la cola.", "info");
                return;
            }

            // Modal progreso
            const progressHtml = document.createElement('div');
            progressHtml.style.textAlign = "center";
            progressHtml.innerHTML = `
                                <div class="spinner" style="margin: 10px auto;"></div>
                                <div style="margin-top:12px;">
                                    <div id="progressText">Procesando 0 / ${processingQueue.length}</div>
                                    <div id="progressDetail" style="font-size:12px;color:#666;margin-top:6px;"></div>
                                </div>
                            `;
            Swal.fire({ title: "Procesando documentos", html: progressHtml, allowOutsideClick: false, allowEscapeKey: false, showConfirmButton: false });

            // enviar cada item a n8n (local por defecto)
            for (let i = 0; i < processingQueue.length; i++) {
                const item = processingQueue[i];
                const progressText = document.getElementById('progressText');
                const progressDetail = document.getElementById('progressDetail');
                if (progressText) progressText.innerText = `Procesando ${i + 1} / ${processingQueue.length}`;
                if (progressDetail) progressDetail.innerText = `Enviando ${item.name}...`;

                const formData = new FormData();
                formData.append('file', item.blob, item.name);
                formData.append('originalName', item.meta.originalName || '');
                formData.append('pageIndex', (item.meta.pageIndex ?? ''));

                try {
                    // intenta local, si falla usa remoto
                    let res = await fetch(N8N_LOCAL, { method: "POST", body: formData });
                    if (!res.ok) {
                        // intenta remoto
                        res = await fetch(N8N_WEBHOOK_URL, { method: "POST", body: formData });
                    }
                    const text = await res.text();
                    let data;
                    try { data = JSON.parse(text); } catch { data = { raw: text }; }

                    //console.log(text)

                    processingResults.push({ queueIndex: i, name: item.name, response: data, blob: item.blob });
                    if (progressDetail) progressDetail.innerText = `Procesado: ${item.name}`;
                } catch (err) {
                    console.error("Error procesando item:", item, err);
                    processingResults.push({ queueIndex: i, name: item.name, response: { error: String(err) }, blob: item.blob });
                    if (progressDetail) progressDetail.innerText = `Error procesando ${item.name}`;
                }
            }

            Swal.close();
            if (processingResults.length > 0) {
                showResultsInDiv(processingResults);
            } else {
                Swal.fire("Terminado", "No se han obtenido resultados.", "info");
            }
        });

        /* ----------------------------
           Mostrar resultados + overlays + drag&drop (usando funciones robustas)
           ---------------------------- */
        function showResultsInDiv(results) {
            processingResults = results;
            currentIndex = 0;
            resultsContainer.classList.remove('hidden');
            renderIndex(0);
        }

        function setInputValueForKey(key, value) {
            if (!key) return;

            // 1️⃣ Si está en el fieldMap
            const mappedId = fieldMap[key];
            if (mappedId) {
                const input = document.getElementById(mappedId);
                if (input) {
                    input.value = value;
                    return;
                }
            }

            // 2️⃣ Intentar por name o id directo
            let input = document.getElementById(key);
            if (!input) {
                input = document.querySelector(`#confirmForm input[name="${key}"]`);
            }

            if (input) {
                input.value = value;
            }
        }

        function drawOverlays(invoice, naturalW, naturalH, scaleX, scaleY) {

            overlayContainer.innerHTML = '';

            const ocrFields = extractOcrFieldsFromAgent(invoice, naturalW, naturalH, ['FORM_FIELD', 'PARAGRAPH']) || [];

            ocrFields.forEach(f => {

                if (!f.bbox) return;

                const box = document.createElement('div');
                box.className = 'ocr-box';

                const x = f.bbox.x * scaleX;
                const y = f.bbox.y * scaleY;
                const w = f.bbox.width * scaleX;
                const h = f.bbox.height * scaleY;

                box.style.left = `${Math.round(x)}px`;
                box.style.top = `${Math.round(y)}px`;
                box.style.width = `${Math.round(w)}px`;
                box.style.height = `${Math.round(h)}px`;

                box.title = f.value || '';

                box.draggable = true;

                box.addEventListener('dragstart', ev => {
                    ev.dataTransfer.setData('text/plain', f.value ?? '');
                    ev.dataTransfer.setData('application/json', JSON.stringify({ key: f.key, value: f.value }));
                });

                box.addEventListener('click', () => setInputValueForKey(f.key, f.value));

                overlayContainer.appendChild(box);

            });

        }

        async function renderIndex(i) {
            confirmForm.classList.add('hidden');
            lineItemsTbody.innerHTML = '';
            overlayContainer.innerHTML = '';

            if (!processingResults || !processingResults.length) return;
            if (i < 0) i = 0;
            if (i >= processingResults.length) i = processingResults.length - 1;

            const r = processingResults[i];
            if (!r || !r.name) return;

            currentIndex = i;
            resultInfo.innerText = `${i + 1} / ${processingResults.length} — ${r.name || 'Sin nombre'}`;

            await loadPreview(r.blob);

            //const targetEl = ocrImage.style.display !== 'none' ? ocrImage : ocrCanvas;

            await new Promise(resolve => requestAnimationFrame(resolve));

            let targetEl, naturalW, naturalH;

            if (ocrImage.style.display !== 'none') {
                targetEl = ocrImage;
                naturalW = ocrImage.naturalWidth;
                naturalH = ocrImage.naturalHeight;
            } else {
                targetEl = ocrCanvas;
                naturalW = ocrCanvas.width;
                naturalH = ocrCanvas.height;
                // asegurarnos de mostrar el canvas
                ocrCanvas.style.display = "block";
                ocrImage.style.display = "none";
            }

            const rect = targetEl.getBoundingClientRect();
            const scaleX = rect.width / naturalW;
            const scaleY = rect.height / naturalH;

            overlayContainer.style.position = 'absolute';
            overlayContainer.style.left = `0px`;
            overlayContainer.style.top = `0px`;

            overlayContainer.style.width = `${rect.width}px`;
            overlayContainer.style.height = `${rect.height}px`;
            overlayContainer.style.transform = 'none';
            overlayContainer.style.pointerEvents = 'auto';

            // Solo llamamos a drawOverlays para posicionar boxes
            let invoice = r.response;
            if (Array.isArray(invoice)) invoice = invoice[0];

            drawOverlays(invoice, naturalW, naturalH, scaleX, scaleY);

            // Rellenar inputs
            ['invoice_id', 'invoice_date', 'supplier_tax_id', 'supplier_name', 'total_amount', 'total'].forEach(k => {
                let val = invoice[k] ?? (invoice.fields?.[k]) ?? '';
                if (!val && Array.isArray(invoice.ocr_fields)) {
                    const f = invoice.ocr_fields.find(x => (x.key || x.name) === k);
                    val = f ? f.value || f.text || '' : '';
                }
                if (val) setInputValueForKey(k, String(val));
            });

            // Rellenar line items
            const items = (invoice && (invoice.line_items || invoice.items)) ? (invoice.line_items || invoice.items) : [];
            if (Array.isArray(items) && items.length) {
                items.forEach(item => {
                    const tr = document.createElement('tr');
                    const desc = item.description || item.desc || item.name || '';
                    const qty = item.quantity || item.qty || '';
                    const unit = item.unit_price || item.unitPrice || item.price || '';
                    const total = item.amount || item.total || item.line_total || '';
                    [desc, qty, unit, total].forEach(v => {
                        const td = document.createElement('td');
                        const input = document.createElement('input');
                        input.value = v;
                        td.appendChild(input);
                        tr.appendChild(td);
                    });
                    lineItemsTbody.appendChild(tr);
                });
            } else {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 4;
                td.innerText = 'Sin line items';
                tr.appendChild(td);
                lineItemsTbody.appendChild(tr);
            }

            confirmForm.classList.remove('hidden');
        }

        /* prev/next handlers */
        prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; renderIndex(currentIndex); } };
        nextBtn.onclick = () => { if (currentIndex < processingResults.length - 1) { currentIndex++; renderIndex(currentIndex); } };

        /* descarga excel */
        document.getElementById('downloadExcelBtn').addEventListener('click', () => {
            const wb = XLSX.utils.book_new();
            const ws_data = [];
            const header = ['Descripción', 'Cantidad', 'Precio Unitario', 'Total'];
            ws_data.push(header);
            document.querySelectorAll('#lineItemsTable tbody tr').forEach(tr => {
                const row = [];
                tr.querySelectorAll('input').forEach(inp => row.push(inp.value));
                ws_data.push(row);
            });
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, 'LineItems');
            XLSX.writeFile(wb, 'factura.xlsx');
        });

        const documentWrapper = document.getElementById('documentWrapper');
        new ResizeObserver(() => {
            if (processingResults.length) renderIndex(currentIndex);
        }).observe(documentWrapper);
    </script>
</body>
