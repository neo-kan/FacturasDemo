<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo · Confirmación de Factura</title>
    <style>
        /* --- CSS BASE --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 16px;
        }

        .upload-card,
        .result,
        #confirmForm {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .upload-button,
        button {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            border: none;
        }

        .upload-button:hover,
        button:hover {
            background: #1e40af;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .file-name {
            margin: 12px 0;
            font-size: 14px;
            color: #6b7280;
        }

        #confirmForm {
            display: grid;
            gap: 16px;
        }

        #confirmForm .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        #confirmForm label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            color: #374151;
        }

        #confirmForm input {
            padding: 6px 8px;
            font-size: 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 100%;
        }

        #lineItemsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            table-layout: fixed;
        }

        #lineItemsTable th,
        #lineItemsTable td {
            padding: 8px 6px;
            border: 1px solid #e6e6e6;
            text-align: left;
            font-size: 13px;
        }

        #lineItemsTable input {
            width: 100%;
            padding: 4px 6px;
            font-size: 13px;
            border-radius: 4px;
        }

        @media (max-width:640px) {
            #lineItemsTable {
                display: block;
                overflow-x: auto;
            }
        }

        #loader {
            display: none;
            text-align: center;
            margin: 24px 0;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Confirmación de Factura</h1>

        <div class="upload-card">
            <input type="file" id="fileInput" accept=".pdf,image/*" multiple hidden />
            <p>Maximo 15 páginas, 20 MB como máximo</p>
            <label for="fileInput" class="upload-button">📄 Subir factura</label>
            <p id="fileName" class="file-name">Ningún archivo seleccionado</p>
            <button id="processBtn" disabled>Procesar factura</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p>Procesando factura, por favor espere...</p>
        </div>

        <!-- Contenedor para mostrar resultados en la página -->
        <div id="resultsContainer" class="hidden">
            <div id="resultsNav" style="display:flex; gap:10px; margin-bottom:12px; align-items:center;">
                <button id="prevResultBtn" class="upload-button" style="background:#94a3b8;">← Anterior</button>
                <button id="nextResultBtn" class="upload-button">Siguiente →</button>
                <div id="resultInfo" style="margin-left:12px; font-size:13px; color:#374151;"></div>
            </div>
            <!-- <div id="resultContent" style="width:100%; min-height:200px;"></div> -->
        </div>

        <form id="confirmForm" class="hidden">
            <div class="form-group">
                <label>Factura Nº <input type="text" id="invoiceNumber" /></label>
                <label>Fecha <input type="text" id="invoiceDate" /></label>
                <label>NIF <input type="text" id="supplierNIF" /></label>
                <label>Total <input type="text" id="total" /></label>
            </div>

            <table id="lineItemsTable">
                <tbody></tbody>
            </table>

            <button type="button" id="downloadExcelBtn">📥 Descargar Excel</button>
        </form>

        <footer>Demo técnica · No se almacenan documentos</footer>
    </div>

    <!-- SweetAlert (solo se sigue usando para el modal de progreso mientras procesa) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- pdf-lib (para dividir PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

    <!-- pdf.js (para miniaturas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // configuramos worker UNA sola vez
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>

    <!-- XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        console.log("pdf.js version:", pdfjsLib.version);

        /* Variables globales */
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const confirmForm = document.getElementById('confirmForm');
        const loader = document.getElementById('loader');

        const N8N_WEBHOOK_URL = "https://n8n-facturas-demo.onrender.com/webhook/google-doc-ai";
        const N8N_LOCAL = "http://localhost:5678/webhook-test/google-doc-ai";

        let fileGen = null;
        let type = "";
        let listaDocumentos = [];
        let processingQueue = [];
        let processingResults = [];
        let currentIndex = 0;
        let pdfRunTogether = true; // default: ejecutar páginas juntas

        /* Reset visual results */
        function resetResultsUI() {
            document.getElementById('resultsContainer').classList.add('hidden');
            confirmForm.classList.add('hidden');
            document.getElementById('resultInfo').innerText = '';
            document.querySelector('#lineItemsTable tbody').innerHTML = '';
            currentIndex = 0;
            processingResults = [];
        }

        /* --- SUBIDA --- */
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            fileGen = null;
            listaDocumentos = [];
            processingQueue = [];
            processingResults = [];

            if (!files.length) {
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            // Separar PDFs e imágenes
            const pdfFiles = files.filter(f => f.type === "application/pdf");
            const imageFiles = files.filter(f => f.type.startsWith("image/"));

            // ❌ Evitar mezcla de PDF e imágenes
            if (pdfFiles.length && imageFiles.length) {
                Swal.fire("Aviso", "No puedes subir un PDF y una imagen al mismo tiempo.", "warning");
                fileInput.value = "";
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            // Solo 1 PDF
            if (pdfFiles.length > 1) {
                Swal.fire("Aviso", "Solo puedes subir un PDF a la vez.", "warning");
                fileInput.value = "";
                fileName.textContent = 'Ningún archivo seleccionado';
                processBtn.disabled = true;
                return;
            }

            // Preparar PDF
            if (pdfFiles.length === 1) {
                fileGen = pdfFiles[0];
                type = "application/pdf";
                fileName.textContent = fileGen.name;
                processBtn.disabled = false;

                // Abrir selector de páginas con opción "juntas o separadas"
                await selecionaPaginasPdf(fileGen);
                return;
            }

            // Preparar imágenes
            if (imageFiles.length > 0) {
                type = "image";
                fileGen = imageFiles;
                fileName.textContent = imageFiles.map(f => f.name).join(", ");
                processBtn.disabled = false;
                return;
            }
        });

        /* --- SELECCIONAR PAGINAS PDF --- */
        async function selecionaPaginasPdf(filePdf) {
            Swal.fire({
                title: "Abriendo PDF",
                text: "Generando miniaturas...",
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const arrayBuffer = await filePdf.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                // Contenedor de miniaturas
                const container = document.createElement("div");
                container.style.display = "flex";
                container.style.flexWrap = "wrap";
                container.style.gap = "10px";
                container.style.maxHeight = "420px";
                container.style.overflow = "auto";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.2 });
                    const canvas = document.createElement("canvas");
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = i;
                    checkbox.style.display = "none";

                    const wrapper = document.createElement("div");
                    wrapper.style.border = "2px solid #ccc";
                    wrapper.style.padding = "6px";
                    wrapper.style.cursor = "pointer";
                    wrapper.style.borderRadius = "6px";
                    wrapper.style.display = "flex";
                    wrapper.style.flexDirection = "column";
                    wrapper.style.alignItems = "center";
                    wrapper.style.background = "#fff";

                    const label = document.createElement("div");
                    label.style.marginTop = "6px";
                    label.style.fontSize = "12px";
                    label.style.color = "#333";
                    label.innerText = `Página ${i}`;

                    wrapper.appendChild(canvas);
                    wrapper.appendChild(label);
                    wrapper.appendChild(checkbox);

                    wrapper.addEventListener("click", () => {
                        checkbox.checked = !checkbox.checked;
                        wrapper.style.border = checkbox.checked ? "2px solid #007bff" : "2px solid #ccc";
                        wrapper.style.background = checkbox.checked ? "#e7f1ff" : "#fff";
                    });

                    container.appendChild(wrapper);
                }

                // Contenedor de radio buttons (juntas/separadas)
                const modeContainer = document.createElement("div");
                modeContainer.style.marginTop = "12px";
                modeContainer.innerHTML = `
            <label>
                <input type="radio" name="executionMode" value="together" checked>
                Ejecutar páginas juntas
            </label>
            &nbsp;&nbsp;
            <label>
                <input type="radio" name="executionMode" value="separate">
                Ejecutar páginas por separado
            </label>
        `;

                // Abrimos el modal
                const { value: result } = await Swal.fire({
                    title: "Selecciona las páginas",
                    html: " ", // placeholder
                    width: "80%",
                    showCancelButton: true,
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonText: "Aceptar",
                    didOpen: () => {
                        const htmlContainer = Swal.getHtmlContainer();
                        htmlContainer.appendChild(container);
                        htmlContainer.appendChild(modeContainer);
                    },
                    preConfirm: () => {
                        const checked = container.querySelectorAll("input:checked");
                        if (checked.length === 0) {
                            Swal.showValidationMessage("Selecciona al menos una página");
                            return false;
                        }
                        const selectedPages = Array.from(checked).map(cb => parseInt(cb.value));
                        const mode = modeContainer.querySelector('input[name="executionMode"]:checked').value;
                        return { selectedPages, mode };
                    }
                });

                if (result) {
                    listaDocumentos = result.selectedPages.map(p => p - 1); // base0
                    listaDocumentosMode = result.mode; // 'together' o 'separate'
                    console.log("Páginas seleccionadas:", listaDocumentos, "Modo:", listaDocumentosMode);
                }
            } catch (err) {
                console.error("Error al generar miniaturas:", err);
                Swal.fire("Error", "No se pudo abrir el PDF.", "error");
                listaDocumentos = [];
            } finally {
                Swal.close();
            }
        }

        /* --- PROCESAR FACTURA --- */
        processBtn.addEventListener('click', async () => {
            fileInput.value = '';
            if (!fileGen) return;
            processingQueue = [];
            processingResults = [];

            if (Array.isArray(fileGen)) {
                // Varias imágenes
                fileGen.forEach(imgFile => {
                    processingQueue.push({
                        blob: imgFile,
                        name: imgFile.name,
                        sourceType: "image",
                        meta: { originalName: imgFile.name }
                    });
                });
            } else if (fileGen.type === "application/pdf") {
                if (!listaDocumentos.length) {
                    Swal.fire("Aviso", "No has seleccionado páginas para el PDF.", "warning");
                    return;
                }

                try {
                    const arrayBuffer = await fileGen.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

                    if (pdfRunTogether) {
                        // Ejecutar juntas: generar PDF solo con las páginas seleccionadas
                        const newPdf = await PDFLib.PDFDocument.create();
                        const copiedPages = await newPdf.copyPages(pdfDoc, listaDocumentos);
                        copiedPages.forEach(p => newPdf.addPage(p));
                        const bytes = await newPdf.save();
                        const blob = new Blob([bytes], { type: "application/pdf" });
                        processingQueue.push({
                            blob,
                            name: fileGen.name.replace(/\.pdf$/i, '') + "_seleccion.pdf",
                            sourceType: "pdf",
                            meta: { originalName: fileGen.name }
                        });
                    } else {
                        // Ejecutar separadas: un PDF por página
                        for (const pageIndex of listaDocumentos) {
                            const newPdf = await PDFLib.PDFDocument.create();
                            const [copied] = await newPdf.copyPages(pdfDoc, [pageIndex]);
                            newPdf.addPage(copied);
                            const bytes = await newPdf.save();
                            const blob = new Blob([bytes], { type: "application/pdf" });
                            processingQueue.push({
                                blob,
                                name: fileGen.name.replace(/\.pdf$/i, '') + `_p${pageIndex + 1}.pdf`,
                                sourceType: "pdf-page",
                                meta: { originalName: fileGen.name, pageIndex }
                            });
                        }
                    }

                } catch (err) {
                    console.error("Error creando PDFs:", err);
                    Swal.fire("Error", "No se pudo preparar el PDF.", "error");
                    return;
                }

            } else {
                Swal.fire("Tipo no soportado", "Solo PDFs e imágenes son soportados.", "warning");
                return;
            }

            if (!processingQueue.length) {
                Swal.fire("Nada que procesar", "No hay documentos en la cola.", "info");
                return;
            }

            // Modal progreso
            const progressHtml = document.createElement('div');
            progressHtml.style.textAlign = "center";
            progressHtml.innerHTML = `
        <div class="spinner" style="margin: 10px auto;"></div>
        <div style="margin-top:12px;">
        <div id="progressText">Procesando 0 / ${processingQueue.length}</div>
        <div id="progressDetail" style="font-size:12px;color:#666;margin-top:6px;"></div>
        </div>
    `;
            Swal.fire({
                title: "Procesando documentos",
                html: progressHtml,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false
            });

            for (let i = 0; i < processingQueue.length; i++) {
                const item = processingQueue[i];
                const progressText = document.getElementById('progressText');
                const progressDetail = document.getElementById('progressDetail');

                if (progressText) progressText.innerText = `Procesando ${i + 1} / ${processingQueue.length}`;
                if (progressDetail) progressDetail.innerText = `Enviando ${item.name}...`;

                const formData = new FormData();
                formData.append('file', item.blob, item.name);
                formData.append('originalName', item.meta.originalName || '');
                formData.append('pageIndex', (item.meta.pageIndex ?? ''));

                try {
                    const res = await fetch(N8N_WEBHOOK_URL, { method: "POST", body: formData });
                    const text = await res.text();
                    let data;
                    try { data = JSON.parse(text); } catch { data = { raw: text }; }

                    processingResults.push({
                        queueIndex: i,
                        name: item.name,
                        response: data
                    });

                    if (progressDetail) progressDetail.innerText = `Procesado: ${item.name}`;
                } catch (err) {
                    console.error("Error procesando item:", item, err);
                    processingResults.push({
                        queueIndex: i,
                        name: item.name,
                        response: { error: String(err) }
                    });
                    if (progressDetail) progressDetail.innerText = `Error procesando ${item.name}`;
                }
            }

            Swal.close();

            if (processingResults.length > 0) showResultsInDiv(processingResults);
            else Swal.fire("Terminado", "No se han obtenido resultados.", "info");
        });

        /* --- Mostrar resultados en divs --- */
        function showResultsInDiv(results) {
            const container = document.getElementById('resultsContainer');
            const info = document.getElementById('resultInfo');
            const prevBtn = document.getElementById('prevResultBtn');
            const nextBtn = document.getElementById('nextResultBtn');

            processingResults = results;
            currentIndex = 0;
            container.classList.remove('hidden');

            function render(i) {
                const r = processingResults[i];
                let invoice = r.response;
                if (Array.isArray(invoice)) invoice = invoice[0];

                info.innerText = `${i + 1} / ${processingResults.length} — ${r.name}`;

                document.getElementById('invoiceNumber').value = invoice?.invoice_id || '';
                document.getElementById('invoiceDate').value = invoice?.invoice_date || '';
                document.getElementById('supplierNIF').value = invoice?.supplier_tax_id || '';
                document.getElementById('total').value = invoice?.total_amount || '';

                const tbody = document.querySelector('#lineItemsTable tbody');
                tbody.innerHTML = '';
                if (invoice?.line_items?.length) {
                    invoice.line_items.forEach(item => {
                        const tr = document.createElement('tr');
                        [item.description || '', item.quantity || '', item.unit_price || '', item.amount || ''].forEach(v => {
                            const td = document.createElement('td');
                            const input = document.createElement('input');
                            input.value = v;
                            td.appendChild(input);
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                } else {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.colSpan = 4;
                    td.innerText = 'Sin line items';
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                }

                confirmForm.classList.remove('hidden');
            }

            prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; render(currentIndex); } };
            nextBtn.onclick = () => { if (currentIndex < processingResults.length - 1) { currentIndex++; render(currentIndex); } };

            render(0);
        }

        /* --- DESCARGAR EXCEL --- */
        document.getElementById('downloadExcelBtn').addEventListener('click', () => {
            const wb = XLSX.utils.book_new();
            const ws_data = [];
            const header = ['Descripción', 'Cantidad', 'Precio Unitario', 'IVA (%)', 'IVA (€)', 'Total (€)'];
            ws_data.push(header);

            document.querySelectorAll('#lineItemsTable tbody tr').forEach(tr => {
                const row = [];
                tr.querySelectorAll('input').forEach(inp => row.push(inp.value));
                ws_data.push(row);
            });

            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, 'LineItems');
            XLSX.writeFile(wb, 'factura.xlsx');
        });
    </script>
</body>

</html>
